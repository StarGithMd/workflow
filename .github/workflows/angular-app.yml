name: Build App
on:
  push:
    branches: [ main ]
jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
	    - uses: actions/checkout@v4.2.2^
      - name: setup Node JS
	      uses: actions/setup-node@v4.2.2
        with:
		      node-version: 22.
	    - name: Install Dependencies
	      run: npm install
	    - name: Build App
	      run: npm run build
		
